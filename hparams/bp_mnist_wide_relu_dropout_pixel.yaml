dataset: mnist
data_root: ./data
feature_type: pixel

train_size: 55000
val_size: 5000
test_size: 10000

hidden_dim: 128
hidden_dims: [1024, 1024]
num_classes: 10
activation: relu
dropout: 0.3
batch_norm: false
weight_init: kaiming

optimizer: sgd_momentum
lr: 0.01
momentum: 0.9
weight_decay: 0.0001

scheduler: reduce_on_plateau
step_size: 10
gamma: 0.5
scheduler_patience: 2
scheduler_monitor: val_loss

loss_name: cross_entropy
label_smoothing: 0.0
gradient_clip_norm: 5.0

normalize_images: true
normalize_features: true
augment_train: true
augment_rotation: 6.0
augment_translate: 0.05
augment_scale_min: 0.98
augment_scale_max: 1.02

batch_size: 64
epochs: 60
num_workers: 0

early_stopping: true
patience: 10

device: cpu
seed: 42
save_dir: checkpoints
result_dir: results
experiment_name: bp_mnist_wide_relu_dropout_pixel
max_wrong_samples: 16