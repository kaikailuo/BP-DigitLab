dataset: mnist
data_root: ./data
feature_type: pixel

train_size: 55000
val_size: 5000
test_size: 10000

hidden_dim: 128
hidden_dims: [128]
num_classes: 10
activation: relu
dropout: 0.0
batch_norm: false
weight_init: kaiming

optimizer: sgd
lr: 0.01
momentum: 0.0
weight_decay: 0.0

scheduler: none
step_size: 10
gamma: 0.5
scheduler_patience: 3
scheduler_monitor: val_loss

loss_name: cross_entropy
label_smoothing: 0.0
gradient_clip_norm: 0.0

normalize_images: false
normalize_features: false
augment_train: false
augment_rotation: 10.0
augment_translate: 0.1
augment_scale_min: 0.95
augment_scale_max: 1.05

batch_size: 64
epochs: 50
num_workers: 0

early_stopping: false
patience: 10

device: cpu
seed: 42

save_dir: checkpoints
result_dir: results
experiment_name: bp_mnist_baseline
max_wrong_samples: 16