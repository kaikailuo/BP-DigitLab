dataset: mnist
data_root: ./data
feature_type: pixel_projection

train_size: 55000
val_size: 5000
test_size: 10000

hidden_dim: 128
hidden_dims: [256, 128]
num_classes: 10
activation: relu
dropout: 0.15
batch_norm: true
weight_init: kaiming

optimizer: adamw
lr: 0.001
momentum: 0.0
weight_decay: 0.0001

scheduler: reduce_on_plateau
step_size: 10
gamma: 0.5
scheduler_patience: 3
scheduler_monitor: val_loss

loss_name: cross_entropy
label_smoothing: 0.05
gradient_clip_norm: 5.0

normalize_images: true
normalize_features: true
augment_train: false
augment_rotation: 10.0
augment_translate: 0.08
augment_scale_min: 0.95
augment_scale_max: 1.05

batch_size: 64
epochs: 60
num_workers: 0

early_stopping: true
patience: 12

device: cpu
seed: 42
save_dir: checkpoints
result_dir: results
experiment_name: bp_mnist_tuned_v2
max_wrong_samples: 16
